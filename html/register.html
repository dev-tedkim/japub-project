<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="writeContainer">
      <section>
        <span>글쓰기</span>
        <div class="buttonBox">
          <a><i class="fa fa-bars"></i> 목록</a>
          <a><i class="fa fa-pencil"></i> 등록</a>
        </div>
      </section>
      <form name="registerForm" method="post" autocomplete="off">
        <input type="hidden" name="boardNum" value="" />
        <input type="text" name="boardTitle" placeholder="제목을 입력하세요" value="" />
        <textarea name="boardContent" rows="20" placeholder="내용을 입력하세요"></textarea>
        <input type="file" name="multipartFiles" multiple />
        <div class="">
          <ul class="thumbnailUl"></ul>
        </div>
      </form>
    </div>
  </body>
</html>
